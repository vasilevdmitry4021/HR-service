services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hr}
      POSTGRES_DB: ${POSTGRES_DB:-hr_service}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hr} -d ${POSTGRES_DB:-hr_service}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      # В slim-образе нет curl; иначе контейнер всегда unhealthy и frontend не стартует
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hr}:${POSTGRES_PASSWORD:-hr}@db:5432/${POSTGRES_DB:-hr_service}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      HH_CLIENT_ID: ${HH_CLIENT_ID:-}
      HH_CLIENT_SECRET: ${HH_CLIENT_SECRET:-}
      HH_REDIRECT_URI: ${HH_REDIRECT_URI:-http://localhost:8000/api/v1/hh/callback}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET:-}
      YANDEX_REDIRECT_URI: ${YANDEX_REDIRECT_URI:-http://localhost:8000/api/v1/auth/oauth/yandex/callback}
      VK_CLIENT_ID: ${VK_CLIENT_ID:-}
      VK_CLIENT_SECRET: ${VK_CLIENT_SECRET:-}
      VK_REDIRECT_URI: ${VK_REDIRECT_URI:-http://localhost:8000/api/v1/auth/oauth/vk/callback}
      VK_OAUTH_BASE_URL: ${VK_OAUTH_BASE_URL:-https://id.vk.com}
      FEATURE_USE_MOCK_LLM: ${FEATURE_USE_MOCK_LLM:-false}
      FEATURE_USE_MOCK_HH: ${FEATURE_USE_MOCK_HH:-false}
      FEATURE_USE_MOCK_SOCIAL_OAUTH: ${FEATURE_USE_MOCK_SOCIAL_OAUTH:-false}
      FEATURE_USE_MOCK_ESTAFF: ${FEATURE_USE_MOCK_ESTAFF:-false}
      ESTAFF_CREATE_CANDIDATE_PATH: ${ESTAFF_CREATE_CANDIDATE_PATH:-/api/candidate/add}
      ESTAFF_VACANCIES_PATH: ${ESTAFF_VACANCIES_PATH:-/api/vacancy/find}
      ESTAFF_HTTP_VERIFY: ${ESTAFF_HTTP_VERIFY:-true}
      ESTAFF_EXPOSE_ERROR_DETAIL: ${ESTAFF_EXPOSE_ERROR_DETAIL:-false}
      ESTAFF_VACANCIES_CACHE_TTL_SECONDS: ${ESTAFF_VACANCIES_CACHE_TTL_SECONDS:-120}
      ESTAFF_FIO_PLACEHOLDER_ENABLED: ${ESTAFF_FIO_PLACEHOLDER_ENABLED:-false}
      ESTAFF_CONTACT_PLACEHOLDER_EMAIL: ${ESTAFF_CONTACT_PLACEHOLDER_EMAIL:-}
      ESTAFF_CONTACT_PLACEHOLDER_MOBILE: ${ESTAFF_CONTACT_PLACEHOLDER_MOBILE:-}
      # Справочник e-staff card_attachment_types: add_comment = «Доп. комментарий»
      ESTAFF_HR_BUNDLE_ATTACHMENT_TYPE_ID: ${ESTAFF_HR_BUNDLE_ATTACHMENT_TYPE_ID:-add_comment}
      # Полный URL фронтенда для ссылки «Открыть карточку» в HTML-вложении e-staff (без / в конце)
      HR_PUBLIC_BASE_URL: ${HR_PUBLIC_BASE_URL:-http://localhost:3000}
      INTERNAL_LLM_ENDPOINT: ${INTERNAL_LLM_ENDPOINT:-}
      INTERNAL_LLM_API_KEY: ${INTERNAL_LLM_API_KEY:-}
      INTERNAL_LLM_MODEL: ${INTERNAL_LLM_MODEL:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      # Включите false в .env на проде, если интеграция не нужна
      FEATURE_USE_TELEGRAM_SOURCE: ${FEATURE_USE_TELEGRAM_SOURCE:-true}
      TELEGRAM_SESSION_ENCRYPTION_KEY: ${TELEGRAM_SESSION_ENCRYPTION_KEY:-}
      TELEGRAM_SYNC_ENABLED: ${TELEGRAM_SYNC_ENABLED:-true}
      TELEGRAM_SYNC_INTERVAL_SECONDS: ${TELEGRAM_SYNC_INTERVAL_SECONDS:-300}
      TELEGRAM_SYNC_BATCH_SIZE: ${TELEGRAM_SYNC_BATCH_SIZE:-100}
      TELEGRAM_MAX_ATTACHMENT_MB: ${TELEGRAM_MAX_ATTACHMENT_MB:-10}
      TELEGRAM_ALLOWED_ATTACHMENT_TYPES: ${TELEGRAM_ALLOWED_ATTACHMENT_TYPES:-pdf,docx,doc,txt}
      TELEGRAM_RESUME_CLASSIFIER_ENABLED: ${TELEGRAM_RESUME_CLASSIFIER_ENABLED:-true}
      TELEGRAM_RESUME_CLASSIFIER_MIN_SCORE: ${TELEGRAM_RESUME_CLASSIFIER_MIN_SCORE:-0.6}
      # Снимки поиска между репликами бэкенда; пустое значение — только память процесса
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    # Миграции до старта API — иначе telegram-ingestion и запросы к БД падают на пустой схеме
    command:
      - sh
      - -c
      - "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      # Кэш Next.js в именованном томе: при bind-mount с Windows (OneDrive) ./frontend/.next часто даёт EACCES
      - frontend_next_build:/app/.next
    # Том node_modules не обновляется сам при смене package-lock; npm ci подтягивает новые пакеты (например sonner).
    command: sh -c "npm ci && npm run dev"
    depends_on:
      backend:
        condition: service_healthy

  telegram-ingestion:
    build:
      context: .
      dockerfile: telegram-ingestion/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hr}:${POSTGRES_PASSWORD:-hr}@db:5432/${POSTGRES_DB:-hr_service}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-}
      TELEGRAM_SESSION_ENCRYPTION_KEY: ${TELEGRAM_SESSION_ENCRYPTION_KEY:-}
      TELEGRAM_SYNC_ENABLED: ${TELEGRAM_SYNC_ENABLED:-true}
      TELEGRAM_SYNC_INTERVAL_SECONDS: ${TELEGRAM_SYNC_INTERVAL_SECONDS:-300}
      TELEGRAM_QUEUED_POLL_SECONDS: ${TELEGRAM_QUEUED_POLL_SECONDS:-15}
      TELEGRAM_SYNC_BATCH_SIZE: ${TELEGRAM_SYNC_BATCH_SIZE:-100}
      TELEGRAM_RESUME_CLASSIFIER_ENABLED: ${TELEGRAM_RESUME_CLASSIFIER_ENABLED:-true}
      TELEGRAM_RESUME_CLASSIFIER_MIN_SCORE: ${TELEGRAM_RESUME_CLASSIFIER_MIN_SCORE:-0.6}
      TELEGRAM_MAX_ATTACHMENT_MB: ${TELEGRAM_MAX_ATTACHMENT_MB:-10}
      TELEGRAM_ALLOWED_ATTACHMENT_TYPES: ${TELEGRAM_ALLOWED_ATTACHMENT_TYPES:-pdf,docx,doc,txt}
      TELEGRAM_ATTACHMENTS_DIR: /data/attachments
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - telegram_attachments:/data/attachments

volumes:
  postgres_data:
  telegram_attachments:
  frontend_next_build:
