name: Test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hr
          POSTGRES_PASSWORD: hr
          POSTGRES_DB: hr_service_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hr -d hr_service_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://hr:hr@localhost:5432/hr_service_test
      SECRET_KEY: ci-secret-not-for-production
      TOKEN_ENCRYPTION_KEY: ci-token-encryption-key-32bytes!!
      FEATURE_USE_MOCK_HH: "true"
      FEATURE_USE_MOCK_LLM: "true"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: WeasyPrint system libs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 \
            libffi-dev shared-mime-info
      - run: pip install -r backend/requirements-dev.txt
      - run: cd backend && alembic upgrade head
      - run: cd backend && pytest tests/ -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint
      - run: cd frontend && npm run test

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hr
          POSTGRES_PASSWORD: hr
          POSTGRES_DB: hr_service_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hr -d hr_service_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://hr:hr@localhost:5432/hr_service_test
      SECRET_KEY: ci-secret-not-for-production
      TOKEN_ENCRYPTION_KEY: ci-token-encryption-key-32bytes!!
      FEATURE_USE_MOCK_HH: "true"
      FEATURE_USE_MOCK_LLM: "true"
      CORS_ORIGINS: "http://127.0.0.1:3000,http://localhost:3000"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: WeasyPrint system libs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 \
            libffi-dev shared-mime-info
      - run: pip install -r backend/requirements-dev.txt
      - run: cd backend && alembic upgrade head
      - name: Start backend
        run: |
          cd backend
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > ../backend-e2e.log 2>&1 &
          echo $! > ../backend-e2e.pid
      - name: Wait for API
        run: timeout 90 bash -c 'until curl -sf http://127.0.0.1:8000/health; do sleep 2; done'
      - run: cd frontend && npm ci && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
      - name: Start frontend
        run: |
          cd frontend
          nohup npm run start > ../frontend-e2e.log 2>&1 &
          echo $! > ../frontend-e2e.pid
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
      - name: Wait for web
        run: timeout 120 bash -c 'until curl -sf -o /dev/null http://127.0.0.1:3000; do sleep 2; done'
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
        env:
          PLAYWRIGHT_API_URL: http://127.0.0.1:8000
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
